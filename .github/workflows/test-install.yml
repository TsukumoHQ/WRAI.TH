name: Test Installers

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  push:
    paths:
      - 'install.sh'
      - 'install.ps1'
      - '.github/workflows/test-install.yml'
  pull_request:
    paths:
      - 'install.sh'
      - 'install.ps1'
  workflow_dispatch:

jobs:
  test-linux:
    name: Linux ${{ matrix.distro }}
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - distro: debian
            image: debian:bookworm
          - distro: ubuntu
            image: ubuntu:24.04
          - distro: fedora
            image: fedora:40
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v6

      - name: Install deps
        run: |
          if command -v apt-get &>/dev/null; then
            apt-get update -qq && apt-get install -y -qq curl ca-certificates
          elif command -v dnf &>/dev/null; then
            dnf install -y -q curl ca-certificates
          fi

      - name: Run installer
        run: bash install.sh --no-service --skip-projects

      - name: Verify binary
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          agent-relay --version
          test "$(agent-relay --version)" = "agent-relay v0.1.0" || test -n "$(agent-relay --version)"

  test-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: amd64
            runner: macos-15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run installer
        run: bash install.sh --no-service --skip-projects

      - name: Verify binary
        run: |
          export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"
          agent-relay --version

  test-windows:
    name: Windows amd64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run installer
        shell: pwsh
        run: |
          . .\install.ps1 -NoService -SkipProjects

      - name: Verify binary
        shell: pwsh
        run: |
          $binPath = Join-Path $env:LOCALAPPDATA "AgentRelay\agent-relay.exe"
          if (Test-Path $binPath) {
            & $binPath --version
          } else {
            Write-Error "Binary not found at $binPath"
            Get-ChildItem $env:LOCALAPPDATA -Recurse -Filter "agent-relay*" | Select FullName
            exit 1
          }

  test-source-build:
    name: Source build (Go + GCC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run installer (should build from source)
        run: bash install.sh --no-service --skip-projects

      - name: Verify binary
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          agent-relay --version

      - name: Verify FTS5 support
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          agent-relay serve &
          sleep 2
          curl -sf http://localhost:8090/api/projects | grep -q '\[' && echo "FTS5 OK" || echo "FTS5 FAIL"
          kill %1 2>/dev/null || true
