name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install GCC (CGO required for SQLite)
        run: sudo apt-get install -y -qq gcc

      - name: Run tests
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 ./...

      # Non-blocking: surfaces known vulnerabilities in PRs without freezing the
      # pipeline on stdlib advisories that only a Go toolchain release can fix.
      - name: govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...
